name: Release Plugin Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (z. B. 0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: Version must be in semver format (e.g. 0.1.0)"
            exit 1
          fi

      - name: Check plugin does not already exist
        run: |
          PLUGIN_DIR="plugins/ls-team-plugin-${{ inputs.version }}"
          if [ -d "$PLUGIN_DIR" ]; then
            echo "Error: Plugin directory $PLUGIN_DIR already exists"
            exit 1
          fi

      - name: Validate rule and skill files (no UTF-8 BOM)
        run: |
          failed=0
          while IFS= read -r -d '' f; do
            bom=$(head -c 3 "$f" | od -An -tx1 | tr -d ' \n')
            if [ "$bom" = "efbbbf" ]; then
              echo "Error: UTF-8 BOM detected in $f"
              echo "  Cursor rule/skill loader fails on files with BOM."
              echo "  Re-save the file as UTF-8 without BOM."
              failed=1
            fi
          done < <(find source -type f \( -name '*.md' -o -name '*.mdc' \) -print0)
          if [ "$failed" -ne 0 ]; then
            echo "BOM validation failed. Aborting release."
            exit 1
          fi
          echo "BOM validation passed."

      - name: Copy source to versioned plugin directory
        run: |
          PLUGIN_DIR="plugins/ls-team-plugin-${{ inputs.version }}"
          mkdir -p plugins
          cp -r source "$PLUGIN_DIR"

      - name: Update version in plugin.json
        run: |
          PLUGIN_JSON="plugins/ls-team-plugin-${{ inputs.version }}/.cursor-plugin/plugin.json"
          PLUGIN_NAME="ls-team-plugin-${{ inputs.version }}"
          DISPLAY_NAME="LS Team Plugin ${{ inputs.version }}"
          jq --arg ver "${{ inputs.version }}" --arg name "$PLUGIN_NAME" --arg display "$DISPLAY_NAME" \
            '.version = $ver | .name = $name | .displayName = $display' \
            "$PLUGIN_JSON" > tmp.json && mv tmp.json "$PLUGIN_JSON"

      - name: Update marketplace.json
        run: |
          MARKETPLACE=".cursor-plugin/marketplace.json"
          PLUGIN_NAME="ls-team-plugin-${{ inputs.version }}"
          PLUGIN_SOURCE="./plugins/ls-team-plugin-${{ inputs.version }}"
          PLUGIN_DESC="Agent Rules v${{ inputs.version }}"
          jq --arg name "$PLUGIN_NAME" \
             --arg source "$PLUGIN_SOURCE" \
             --arg desc "$PLUGIN_DESC" \
            '.plugins += [{"name": $name, "source": $source, "description": $desc}]' \
            "$MARKETPLACE" > tmp.json && mv tmp.json "$MARKETPLACE"

      - name: Commit release artifacts
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          BOT_USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${BOT_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
          git add plugins/ .cursor-plugin/marketplace.json
          git commit -m "Release ls-team-plugin-${{ inputs.version }}"

      - name: Create tag
        run: |
          git tag "v${{ inputs.version }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes
